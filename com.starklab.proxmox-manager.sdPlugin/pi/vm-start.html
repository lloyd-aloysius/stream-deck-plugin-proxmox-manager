<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>VM Start</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div id="cascading"></div>
	<div class="divider"></div>
	<div class="hint">Standard press starts the selected VM.</div>

	<script src="sdpi.js"></script>
	<script src="cascading-selector.js"></script>
	<script src="server-manager.js"></script>
	<script>
		sdpi.ready((ctx) => {
			window.installServerManager(ctx);
			const sel = createCascadingSelector({ ctx, root: document.getElementById('cascading'), levels: ['server', 'node', 'vm'] });
			sel.onChange((v) => ctx.saveSettings({ serverId: v.serverId, node: v.node, vmid: v.vmid, label: v.label }));
		});
	</script>
</body>
</html>
